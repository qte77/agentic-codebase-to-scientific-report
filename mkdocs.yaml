# MkDocs configuration. The live GitHub Pages deploy is deferred (see docs/roadmap.md);
# this file is validated by `mkdocs build` and drives the site once deploy lands.
# When the deploy workflow is added, it will copy the root governance files
# (README.md -> index.md, CONTRIBUTING.md, AGENTS.md, CHANGELOG.md, LICENSE.md) into
# docs/ and extend the nav accordingly.
site_name: Agentic Scientific Report Generator
site_description: Turn a code repository into a structured scientific report using Claude subagents
repo_url: https://github.com/qte77/agentic-codebase-to-scientific-report
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - content.code.copy
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

plugins:
  - search:
      lang: en

# strict:false — cross-doc links to root governance files resolve only after the
# (deferred) deploy step copies them into docs/.
strict: false
validation:
  links:
    not_found: warn
    anchors: warn

nav:
  - Home: index.md
  - User Story: UserStory.md
  - Architecture: architecture.md
  - Roadmap: roadmap.md
  - How-Tos:
      - Running the Pipeline: howtos/running-the-pipeline.md
