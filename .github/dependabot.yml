---
# Keep SHA-pinned GitHub Actions current. The pip ecosystem is intentionally
# omitted until a Python lockfile (requirements.txt / uv.lock) exists — there is
# nothing actionable for Dependabot to track yet.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns: ["*"]
