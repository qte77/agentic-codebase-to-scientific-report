name: CodeQL

# This repo has no Python/JS source (shell is not CodeQL-supported), so the
# analyzable surface is the GitHub Actions workflows themselves. Actions are
# github-owned and SHA-pinned, so no actions-allowlist change is required.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '27 11 * * 0' # weekly, Sunday 11:27 UTC
  workflow_dispatch:

# Least-privilege default; the analyze job elevates only what it needs.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (actions)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          languages: actions

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          category: "/language:actions"
