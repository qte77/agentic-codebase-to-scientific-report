name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default token scope; steps elevate only if needed.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save runner time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan all commits

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint GitHub Actions workflows (actionlint)
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
        with:
          reporter: local
          filter_mode: nofilter
          fail_on_error: true

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Lint Markdown
        run: make lint_md

      - name: Lint shell scripts
        run: make lint_sh

      - name: Validate pipeline Makefile (dry-run, no LLM cost)
        run: make -n all
